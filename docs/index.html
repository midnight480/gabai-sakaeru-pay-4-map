            </div>
            <div id="filters">

                    <option value="">すべてのカテゴリ</option>
                </select>
                <select id="filter-area">
                    <option value="">すべてのエリア</option>
                </select>
                <button id="reset-filters">✕ クリア</button>
            </div>
            <div id="shop-count">表示中: <span id="displayed-count">0</span> / <span id="total-count">0</span>店舗</div>
        </header>
        <div id="map" class="view-content active"></div>
        <div id="list-view" class="view-content">
            <div id="shop-list"></div>
        </div>
    </div>

    <!-- Shop Modal -->
    <div id="shop-modal" class="modal">
        <div class="modal-content" id="shop-modal-content">
        </div>
    </div>

    <!-- Info Modal -->
    <div id="info-modal" class="modal">

            <div class="modal-header">
                <h2 id="info-modal-title"></h2>
                <button class="modal-close" onclick="closeInfoModal()">&times;</button>
            </div>
            <div class="modal-body" id="info-modal-body">

    <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => {
                        console.log('Service Worker registered with scope:', registration.scope);
                    })
                    .catch(error => {
